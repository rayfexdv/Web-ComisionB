<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de paisajes, modificado en local</title>
    <link rel="stylesheet" href="galeria.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css" />

</head>
<body>
      
 <!-- ===================== SECCIÓN 1: GALERÍA DE IMÁGENES ===================== -->
    <section id="gallery-section">
      <div class="section-label"><span>
      <h2>Galería de Imágenes</h2>
      <p>
        Los elementos agrupados con el mismo valor en <code>data-fancybox="gallery"</code>
        forman una galería navegable. Haz clic en cualquier imagen para abrirla en el lightbox.
      </p>

      <div class="gallery-grid" id="gallery-wrap">

        <a href="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=90" data-fancybox="gallery"
          data-caption="<strong>Pico Nevada al Amanecer</strong><br>Cordillera de los Alpes, Suiza"
          class="gallery-item">
          <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80"
            alt="Pico Nevada al Amanecer" loading="lazy" />
          <div class="overlay">
            <span class="overlay-text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
                <path d="M11 8v6M8 11h6" />
              </svg>
              Ver en grande
            </span>
          </div>
        </a>

        <a href="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=90" data-fancybox="gallery"
          data-caption="<strong>Valle de Niebla</strong><br>Sierra Nevada, España" class="gallery-item">
          <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80" alt="Valle de Niebla"
            loading="lazy" />
          <div class="overlay">
            <span class="overlay-text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
                <path d="M11 8v6M8 11h6" />
              </svg>
              Ver en grande
            </span>
          </div>
        </a>

        <a href="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=90" data-fancybox="gallery"
          data-caption="<strong>Cima Nocturna</strong><br>Montañas Rocosas, Canadá" class="gallery-item">
          <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600&q=80"
            alt="Cima Nocturna con Estrellas" loading="lazy" />
          <div class="overlay">
            <span class="overlay-text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
                <path d="M11 8v6M8 11h6" />
              </svg>
              Ver en grande
            </span>
          </div>
        </a>

        <a href="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1920&q=90" data-fancybox="gallery"
          data-caption="<strong>Otoño en la Cordillera</strong><br>Dolomitas, Italia" class="gallery-item">
          <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600&q=80"
            alt="Otoño en la Cordillera" loading="lazy" />
          <div class="overlay">
            <span class="overlay-text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
                <path d="M11 8v6M8 11h6" />
              </svg>
              Ver en grande
            </span>
          </div>
        </a>

      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js"></script>
    <script async src="galeria.js"></script>
</body>
</html>
